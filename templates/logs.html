<!DOCTYPE html>
<html>
<head>
    <title>Logs</title>
    <link rel="stylesheet" href="/static/style.css">
   <style>
    body {
        margin: 0;
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        background: url('/static/Photo4.jpg') no-repeat center center fixed;
        background-size: cover;
        color: white;
    }

    .container {
        max-width: 1000px;
        margin: 50px auto;
        padding: 30px;
        background: rgba(0, 0, 0, 0.5); /* darker transparent background */
        border-radius: 12px;
    }

    h2 {
        text-align: center;
        color: #ffffff;
        margin-bottom: 20px;
        font-size: 32px;
    }

    table {
        width: 100%;
        border-collapse: collapse;
        background: transparent;
    }

    th, td {
        padding: 12px 16px;
        border: 1px solid #ffffff40;
        text-align: left;
        background-color: rgba(0, 0, 0, 0.3); /* dark row background for contrast */
        color: #ffffff;
        font-weight: 500;
    }

    th {
        background-color: rgba(0, 64, 128, 0.9);
        font-weight: bold;
    }

    tr:nth-child(even) td {
        background-color: rgba(0, 0, 0, 0.25);
    }

    a {
        display: inline-block;
        margin-bottom: 20px;
        text-decoration: none;
        color: white;
        background-color: #004080;
        padding: 10px 20px;
        border-radius: 6px;
        font-weight: bold;
        transition: background-color 0.3s ease;
    }

    a:hover {
        background-color: #0066cc;
    }
</style>

</head>
<body>

<div class="container">
    <a href="/">← Back to Home</a>
    <h2>History</h2>
    <table>
        <tr>
            <th>ID</th>
            <th>Case Type</th>
            <th>Case Number</th>
            <th>Year</th>
            <th>Result</th>
        </tr>
        {% for log in logs %}
        <tr>
            <td>{{ log[0] }}</td>
            <td>{{ log[1] }}</td>
            <td>{{ log[2] }}</td>
            <td>{{ log[3] }}</td>
            <td>{{ log[4] }}</td>
        </tr>
        {% endfor %}
    </table>
</div>

</body>
</html>
